<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignment 5 | A Day in the Sky</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
</head>
<body style="margin:0">
  <script>
// ARTG-2262 | Prototyping with Code
// Jaden Pinet | pinet.j@northeastern.edu
// Assignment 5 | "A Day in the Sky"

let clouds = [];
let pulseAngle = 0;

function setup() {
  createCanvas(windowWidth, windowHeight);

  for (let i = 0; i < 20; i++) {
    clouds.push({
      x:      random(width),
      y:      random(height * 0.1, height * 0.9),
      size:   random(width * 0.05, width * 0.11),
      speed:  random(0.1, 0.4),
      bright: random(200, 255)
    });
  }
}

function draw() {
  drawSky();
  drawSun();

  for (let c of clouds) {
    drawCloud(c.x, c.y, c.size, c.bright);
    c.x -= c.speed;
    if (c.x < -c.size * 2) {
      c.x = width + c.size * 2;
      c.y = random(height * 0.1, height * 0.9);
    }
  }

  drawClock();
  pulseAngle += 0.04;
}

function drawSky() {
  let h = hour() + minute() / 60.0;

  let cMidnight = color(10,  15,  50);
  let cDawn     = color(255, 140,  80);
  let cMorning  = color(135, 195, 235);
  let cNoon     = color(90,  170, 230);
  let cDusk     = color(220,  90,  60);
  let cEvening  = color(50,   30, 100);

  let skyColor;
  if      (h < 6)  skyColor = lerpColor(cMidnight, cDawn,     h / 6.0);
  else if (h < 9)  skyColor = lerpColor(cDawn,     cMorning,  (h - 6)  / 3.0);
  else if (h < 14) skyColor = lerpColor(cMorning,  cNoon,     (h - 9)  / 5.0);
  else if (h < 18) skyColor = lerpColor(cNoon,     cDusk,     (h - 14) / 4.0);
  else if (h < 21) skyColor = lerpColor(cDusk,     cEvening,  (h - 18) / 3.0);
  else             skyColor = lerpColor(cEvening,  cMidnight, (h - 21) / 3.0);

  background(skyColor);
}

function drawSun() {
  let h = hour() + minute() / 60.0;

  let sunX = width  * 0.5;
  let sunY = height * 0.5;

  let baseR = width * 0.06;
  let pulse = sin(pulseAngle) * width * 0.01;
  let sunR  = baseR + pulse;

  let t = map(abs(h - 12), 0, 12, 0, 1);
  let sunColor = lerpColor(color(255, 245, 80), color(255, 180, 50), t);

  noStroke();
  for (let i = 6; i > 0; i--) {
    fill(red(sunColor), green(sunColor), blue(sunColor), 14);
    circle(sunX, sunY, (sunR + i * width * 0.025) * 2);
  }

  fill(sunColor);
  circle(sunX, sunY, sunR * 2);
}

function drawCloud(x, y, size, brightness) {
  noStroke();
  fill(brightness);

  circle(x,              y,              size);
  circle(x + size * 1.0, y,              size);
  circle(x + size * 0.5, y - size * 0.4, size * 1.1);
  circle(x - size * 0.3, y + size * 0.1, size * 0.8);
  circle(x + size * 1.3, y + size * 0.1, size * 0.8);

  rect(x - size * 0.35, y, size * 1.75, size * 0.5);
}

function drawClock() {
  let h    = hour();
  let m    = minute();
  let s    = second();
  let ampm = h >= 12 ? "PM" : "AM";
  let h12  = h % 12 || 12;

  let timeStr = h12 + ":" + nf(m, 2) + ":" + nf(s, 2) + " " + ampm;

  let isDaytime = h >= 6 && h < 20;
  fill(isDaytime ? color(30, 30, 60) : color(220, 220, 180));
  noStroke();
  textSize(width * 0.022);
  textAlign(LEFT, TOP);
  text(timeStr, width * 0.025, height * 0.025);
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}

function keyPressed() {
  if (key === 'S' || key === 's') {
    saveCanvas("assignment5_screensaver_Pinet_Jaden");
  }
}
  </script>
</body>
</html>
